<html>
    <head>
        <title>MTR PIDS Preview</title>

        <style>
            #pidsCanvas {
                width: 512px;
                height: 286px;
                border: 4px solid black;
                background: black;
            }
        </style>
    </head>

    <body>
        <canvas width="1024" height="572" id="pidsCanvas"></canvas>
        <br><br>
        <button onclick="renderingActive = true;">Start</button>
        <button onclick="renderingActive = false;">Pause</button>
        <button onclick="resetPIDSData();">Reset</button>
        <button id="importTextureBtn">Import Texture</button>
        <input type="file" id="textureFileInput" accept="image/png" style="display:none">

        <script src="main.js"></script>
        <script src="cta_pids.js"></script>
    </body>
</html>
