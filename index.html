<html>
    <head>
        <title>MTR PIDS Preview</title>

        <style>
            #pidsCanvas {
                border: 4px solid black;
                background: black;
            }

            body {
                padding: 16px !important;
                text-align: center;
            }

            .hidden {
                display: none;
            }

            .pidsTypeCard {
                padding: 8px;
            }
        </style>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
        <link rel="stylesheet" href="https://ejd799.github.io/BulmaColoredInputs/main.css">
        <link rel="stylesheet" href="https://ejd799.github.io/BulmaSelectmenu/selectmenu.css">
        <script src="https://ejd799.github.io/BulmaSelectmenu/selectmenu.js"></script>
    </head>

    <body>
        <button class="button is-success" onclick="renderingActive = true;">Start</button>
        <button class="button is-warning" onclick="renderingActive = false;">Pause</button>
        <button class="button is-danger" onclick="resetPIDSData();">Reset</button>
        <button class="button" id="importTextureBtn">Import Texture</button>
        <div class="select">
            <select id="pidsSizeMenu">
                <option value="rv_pids">RV PIDS</option>
                <option value="lcd_pids">LCD PIDS</option>
                <option value="pids_1a">PIDS 1A</option>
            </select>
        </div>
        <input type="file" id="textureFileInput" accept="image/png" style="display:none">
        <br><br>
        <canvas style="width:512px;height:286px;" width="1024" height="572" id="pidsCanvas"></canvas>

        <div class="modal is-active" id="setupDlg">
            <div class="modal-background"></div>
            <div class="modal-content card" style="height:500px;padding:20px;">
                <span class="title is-3">Welcome to MTR PIDS Preview!</span>
                <div id="setupPage1">
                    <p>Please select a PIDS type to use.</p>
                    <div class="card pidsTypeCard">
                        <span class="title is-5">Custom Code</span>
                        <p>Paste in the code for your own PIDS pack to test it.</p>
                        <button class="button is-primary" onclick="setupPage(2);">Select</button>
                    </div>
                </div>
                <div id="setupPage2" class="hidden">
                    <p>Paste in the code for your PIDS preset.</p>
                    <button class="button is-primary" onclick="setupPage(3);">Next</button>
                </div>
                <div id="setupPage3" class="hidden">
                    <p>Upload all textures that your PIDS uses, and make sure to set the file names correctly.</p>
                    <button class="button is-primary" onclick="exitSetup();">Done</button>
                </div>
            </div>
        </div>

        <script src="main.js"></script>
    </body>
</html>
